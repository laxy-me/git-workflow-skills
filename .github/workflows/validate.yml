name: Validate Skills

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md files
        run: |
          failed=0

          for skill_file in $(find . -name "SKILL.md" -not -path "./.git/*"); do
            echo "Checking $skill_file..."

            # Check frontmatter exists
            if ! head -1 "$skill_file" | grep -q '^---$'; then
              echo "  ERROR: missing frontmatter opening '---'"
              failed=1
              continue
            fi

            # Check required fields
            for field in name description; do
              if ! awk '/^---$/{found++} found==1' "$skill_file" | grep -q "^$field:"; then
                echo "  ERROR: missing required frontmatter field '$field'"
                failed=1
              fi
            done

            # Check frontmatter is closed
            if ! awk 'NR>1 && /^---$/{found=1} END{exit !found}' "$skill_file"; then
              echo "  ERROR: frontmatter is not closed with '---'"
              failed=1
              continue
            fi

            # Check body is not empty
            body=$(awk '/^---$/{n++} n==2{found=1} found && !/^---$/{print}' "$skill_file" | grep -v '^$')
            if [ -z "$body" ]; then
              echo "  ERROR: skill body is empty"
              failed=1
            fi

            echo "  OK"
          done

          if [ $failed -ne 0 ]; then
            echo ""
            echo "Validation failed. Fix the errors above before merging."
            exit 1
          fi

          echo ""
          echo "All SKILL.md files are valid."
